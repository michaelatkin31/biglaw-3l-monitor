name: biglaw-3l-monitor

# Daily digest of new 3L / entry-level associate postings.
#
# Schedule: 08:17 UTC every day = ~4:17 AM US-Eastern during EDT (summer) and
# ~3:17 AM during EST (winter). GitHub cron is always UTC, so a fixed local hour
# year-round isn't possible; this targets the early-morning window the inbox is
# checked. Deliberately at :17, NOT on the hour -- GitHub throttles the flood of
# jobs scheduled at :00 and delays them (the old "0 12" run routinely fired
# ~90 min late, landing near 10 AM ET). An off-hour minute runs closer to on-time.
on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch: {}     # allow manual runs from the Actions tab

# Needed so the job can commit state.db back to the repo.
permissions:
  contents: write

concurrency:
  group: biglaw-3l-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium (for the browser fetcher)
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # EMAIL_TO is the primary recipient list; EMAIL_TO_EXTRA appends more
          # recipients without exposing addresses in this public repo (main.py
          # splits on commas and ignores blanks, so an unset EMAIL_TO_EXTRA and
          # the trailing comma are both harmless).
          EMAIL_TO: "${{ secrets.EMAIL_TO }},${{ secrets.EMAIL_TO_EXTRA }}"
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python main.py

      - name: Persist state.db
        # Commit the updated SQLite state back so the next run diffs against it.
        # Guarded against empty commits so we don't spam history on quiet days.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain state.db)" ]]; then
            git add state.db
            git commit -m "chore: update state.db [skip ci]"
            git push
          else
            echo "state.db unchanged; nothing to commit."
          fi

# (registered with GitHub Actions 2026-07-20)
