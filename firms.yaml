coverage_summary: >
  73 firms listed — the high-confidence intersection CORE of Vault 100 and Am Law
  200, NOT the full ~85-95 (both sources paywalled/gated; with WebFetch and all
  direct HTTP egress blocked by the org proxy, only WebSearch worked, so the lists
  could not be enumerated end-to-end). ATS was verified for 66 of the first 68 via
  sub-agents that read the ATS host out of URLs in WebSearch results (never guessing
  tokens). Breakdown: WORKDAY 20 (Skadden skadden/Skadden_Careers, Simpson Thacher
  stblaw/careers, Weil weil/work_at_weil, Wilson Sonsini wsgr/WSGR, Cooley
  cooley/Cooley_US_LLP, Dechert dechert/DechertCareers, King & Spalding kslaw/careers,
  Fenwick fenwick/Fenwick_External_Careers, Goodwin goodwinprocter/External_Careers,
  McDermott mwe/mwe_careers, Hogan Lovells hoganlovells/Search, Norton Rose Fulbright
  nrf/External, Gunderson gunder/Gunderson, Perkins Coie perkinscoie/perkinscoieexternal,
  Morgan Lewis morganlewis/morganlewis, Holland & Knight hklaw/Holland_Knight, DLA
  Piper dlapiper/dlapiper, Alston & Bird alston/ExternalCareer, Munger Tolles
  mto/MTO_Careers, Troutman Pepper Locke troutman/TPRecruit1 — all tenant/site copied
  from real myworkdayjobs URLs); FLO_RECRUIT 10 (Wachtell, Mayer Brown, Vinson &
  Elkins, Baker Botts [low], Proskauer, Akin Gump, Winston & Strawn, Sheppard Mullin,
  Cahill, HSF Kramer); VIRECRUIT 4 (Paul Hastings, Cadwalader, Willkie — all confirmed
  via viRecruitSelfApply URLs; Jones Day inferred from 'SelfApply'); GREENHOUSE 2
  (Fried Frank token friedfrankharrisshriverjacobsonllp confirmed; Gibson Dunn token
  'gibsondunn' confirmed but on a STAFF posting — attorney path may be viRecruit,
  flagged); VIGLOBAL 1 (Orrick, inferred from hosted domain); OTHER 29 (iCIMS: Latham,
  Milbank, Cleary, Foley, Sidley; Taleo: Paul Weiss, Katten, White & Case, +MoFo;
  AllHires: Debevoise; Kenexa BrassRing: A&O Shearman; Avature: Baker McKenzie;
  SilkRoad: WilmerHale; SmartRecruiters: Crowell & Moring; PeopleSoft: Reed Smith;
  self-hosted/custom/email: Cravath, Kirkland, Sullivan & Cromwell, Davis Polk,
  Covington, Ropes & Gray, Arnold & Porter, Quinn Emanuel, Fish & Richardson, Schulte
  Roth, Hughes Hubbard, Boies Schiller, Williams & Connolly, Susman Godfrey). UNKNOWN 2
  (Jenner & Block, Greenberg Traurig — branded custom portals, no ATS host exposed).
  public_entry_level: TRUE for ~55 firms (surface summer/entry/3L programs publicly),
  UNKNOWN for ~12 (mostly Vault top firms on Workday — Skadden, Simpson Thacher, Weil,
  Kirkland, Milbank, Sidley, Wilson Sonsini, Cooley, Cadwalader, Quinn Emanuel — whose
  public boards skew lateral and route first-years via OCI), FALSE for 1 (Morrison &
  Foerster explicitly declines public first-year/clerk submissions). Intersection
  uncertainty flags: Magic Circle (Freshfields, Clifford Chance, Linklaters) on Vault
  but excluded as non-Am Law 200; A&O Shearman included but flagged (ambiguous
  post-merger reporting); Kramer Levin/HSF Kramer likely fell out of the current Vault
  100 after its merger; the ~15-25 Vault tail firms (ranks ~70-100: e.g. Kellogg
  Hansen, Keker Van Nest, Kobre & Kim, Nixon Peabody, Venable, Seyfarth, Duane Morris,
  Faegre Drinker, Ballard Spahr) could not be enumerated from search snippets and are
  NOT in this list (though 5 tail firms — K&L Gates #49, Pillsbury #58, McGuireWoods
  #70, Kellogg Hansen #74, Mintz #79 — were confirmed and added with ATS unresearched).
  MEMBERSHIP CAVEAT: the Vault-membership agent could NOT independently confirm
  Vault-100 placement for 10 large-revenue firms in this list — Gunderson Dettmer,
  Foley & Lardner, Baker McKenzie, Greenberg Traurig, DLA Piper, Reed Smith, Troutman
  Pepper Locke, Crowell & Moring, Morgan Lewis, Holland & Knight; these are solidly Am
  Law 100/200 but their Vault prestige placement (and thus intersection membership) is
  UNCERTAIN and should be re-verified against the full Vault list. Also note the
  2026-2027 edition reshuffled the top 10 (Sullivan & Cromwell to #5, Kirkland #6,
  Gibson Dunn #8, Paul Weiss down to #13).
