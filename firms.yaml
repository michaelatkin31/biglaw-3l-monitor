# BigLaw entry-level associate job-posting monitor — firm dataset
# METHOD: every firm's ATS was LIVE-VERIFIED on 2026-07-20 (careers page fetched,
# candidate JSON/HTML endpoint hit, board titles inspected for real attorney roles
# vs the staff-board trap). The set is the UNION of the Vault Law 100 and the Am
# Law 200 (expanded 2026-07-20 from the earlier Vault∩AmLaw intersection core).
#
# WHAT ACTUALLY FETCHES: ats_type in
#   workday | greenhouse | lever | generic | careerpage | smartrecruiters | virecruit | radancy | ashby
# has a live fetcher and is polled. The virecruit fetcher parses the PUBLIC
# self-apply listing HTML (RecDefault/ReDefault.aspx GridView) used by a large
# share of firms (vi by Aderant) — the listing is public even though Apply is
# login-gated; this is the single biggest source of coverage. The rest
# (flo_recruit, viglobal/iCIMS/Taleo/LawCruit/Avature, Cloudflare/TLS-blocked
# hosts, or email-only) have NO pollable endpoint and are SKIPPED (never crash).
# Some firms expose a public API that is a staff-only board with zero attorneys
# (Wachtell, Proskauer) — kept skipped.
#
# The Am Law tail (ranks ~50-200) leans much more on pollable ATSs (esp. viRecruit,
# Ashby, Workday) and posts entry-level/2L-summer roles publicly far more than the
# elite core, so the union expansion materially raises genuine coverage.
# Re-verify with `python classify.py`. See README.md and DECISIONS.md.

sources:
  vault_100:
    url: "https://vault.com/best-companies-to-work-for/law/top-100-law-firms-rankings"
    year: 2026   # "2026" edition, released June 2025, from a Jan-Mar 2025 survey of 20,000+ associates
    note: >
      Full ranked list gated on vault.com. Confirmed top 10: 1 Cravath, 2 Wachtell,
      3 Skadden, 4 Latham, 5 Kirkland, 6 Sullivan & Cromwell, 7 Davis Polk,
      8 Paul Weiss, 9 Milbank, 10 Simpson Thacher. Also confirmed: Ropes & Gray #20,
      Jenner & Block #43, McDermott Will & Schulte #46, A&O Shearman #56-62,
      Kramer Levin was #92 (now merged to HSF Kramer). A newer 2026-2027 edition
      (released April 2026) also exists.
  amlaw_200:
    url: "https://www.law.com/americanlawyer/the-2025-am-law-200/"
    year: 2025   # 2025 Am Law 200, based on calendar-year 2024 gross revenue
    note: >
      Paywalled on law.com. The Am Law 100/200 ranks US-HQ (or US-reporting/verein)
      firms by gross revenue; London-HQ Magic Circle firms (Freshfields, Clifford
      Chance, Linklaters) are in the separate Global 200, NOT the Am Law 200, so they
      are EXCLUDED from the intersection. 2026 edition (2025 revenue) also exists at
      law.com/americanlawyer/2026/05/05/the-2026-am-law-200-ranked-by-gross-revenue/.

