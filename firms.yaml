# BigLaw entry-level associate job-posting monitor — firm registry (firms.yaml)
#
# Schema per firm (consumed by fetchers/base.py Firm.from_dict):
#   name:               canonical firm name
#   careers_url:        attorney/associate careers page (used by generic fetcher
#                       and by classify.py to auto-detect the ATS)
#   ats_type:           greenhouse | lever | workday | generic | unknown
#   ats_identifier:     greenhouse -> board token; lever -> company slug;
#                       workday -> "tenant/site"; generic -> null (uses careers_url)
#   public_entry_level: true|false|unknown (does the firm post entry roles publicly)
#   note:               free-form; used here to flag uncertainty
#   (optional) workday_host / workday_locale / render: playwright  -> ATS overrides
#
# CONFIDENCE / HOW THIS WAS BUILT: this dataset was assembled in a sandbox where
# ALL direct HTTP egress (curl + WebFetch to arbitrary hosts) was blocked by org
# policy (HTTP 403 on every host), so no firm's careers page could be probed.
# The list is therefore the best-effort Vault-100 ∩ Am-Law-200 intersection from
# search anchors + domain knowledge, and EVERY firm is ats_type: unknown because
# guessing ATS tokens is explicitly disallowed. See DECISIONS.md.
#
# >>> TO MAKE THIS FUNCTIONAL: run `python classify.py --write` from a machine
#     (or GitHub Actions) with open egress. It probes each careers_url, detects
#     the ATS, and fills in ats_type / ats_identifier in place. Firms it cannot
#     classify stay `unknown` and are skipped at runtime (never crash). <<<

sources:
  vault_100:
    url: "https://vault.com/best-companies-to-work-for/law/top-100-law-firms-rankings"
    year: 2026   # "2026" edition, released June 2025, from a Jan-Mar 2025 survey of 20,000+ associates
    note: >
      Full ranked list is gated on vault.com and could not be enumerated via
      search. Confirmed top 10: 1 Cravath, 2 Wachtell, 3 Skadden, 4 Latham,
      5 Kirkland, 6 Sullivan & Cromwell, 7 Davis Polk, 8 Paul Weiss, 9 Milbank,
      10 Simpson Thacher. Other confirmed placements: Ropes & Gray #20,
      McDermott Will & Schulte #46, Jenner & Block #43, A&O Shearman #56-62.
      A newer 2026-2027 edition (released April 2026) also exists.
  amlaw_200:
    url: "https://www.law.com/americanlawyer/the-2025-am-law-200/"
    year: 2025   # 2025 Am Law 200, based on calendar-year 2024 gross revenue
    note: >
      Paywalled on law.com; not enumerable via search. The Am Law 100/200 ranks
      US-headquartered (or US-reporting/verein) firms by gross revenue. London-HQ
      Magic Circle firms (Freshfields, Clifford Chance, Linklaters) are generally
      NOT in the Am Law 200 (covered instead in the separate Global 200), so they
      are EXCLUDED from the intersection even though they may appear on Vault.
      A 2026 Am Law 200 (2025 revenue) also exists at
      law.com/americanlawyer/2026/05/05/the-2026-am-law-200-ranked-by-gross-revenue/.

