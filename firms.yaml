# BigLaw entry-level associate job-posting monitor — firm dataset
# CONFIDENCE / METHOD: WebFetch and all direct HTTP egress (curl/bash) were blocked
# by the org proxy (HTTP 403 on every host). Only WebSearch worked. Both source
# rankings are gated (Vault paywall / law.com subscription) and could not be
# enumerated in full. The firm set is the high-confidence intersection CORE
# (firms confidently on BOTH the Vault 100 and the Am Law 200), reconstructed from
# confirmed search anchors + domain knowledge — NOT the complete ~85-95.
# ATS fields were verified by sub-agents that inferred each firm's ATS from URLs
# appearing in WebSearch results (never guessing tokens). 66 of 68 firms classified;
# 2 (Jenner, Greenberg Traurig) use branded custom portals with no ATS host exposed.
#
# WHAT ACTUALLY FETCHES: only ats_type greenhouse | lever | workday have public
# fetchers, so the monitor actively polls the 2 Greenhouse + 20 Workday firms
# (~22). The rest — flo_recruit, virecruit, viglobal, other, unknown — are
# recognized but not publicly queryable, so they are SKIPPED at runtime (never
# crash). This is the public-coverage ceiling: most BigLaw first-year hiring runs
# through Flo Recruit / viRecruit / iCIMS / Taleo / OCI, not a public JSON API.
#
# The ATS data here is search-derived, not live-verified. Run `python classify.py`
# from a machine with open egress to re-probe careers pages and confirm/refresh
# ats_type / ats_identifier / workday_host. See README.md and DECISIONS.md.

sources:
  vault_100:
    url: "https://vault.com/best-companies-to-work-for/law/top-100-law-firms-rankings"
    year: 2026   # "2026" edition, released June 2025, from a Jan-Mar 2025 survey of 20,000+ associates
    note: >
      Full ranked list gated on vault.com. Confirmed top 10: 1 Cravath, 2 Wachtell,
      3 Skadden, 4 Latham, 5 Kirkland, 6 Sullivan & Cromwell, 7 Davis Polk,
      8 Paul Weiss, 9 Milbank, 10 Simpson Thacher. Also confirmed: Ropes & Gray #20,
      Jenner & Block #43, McDermott Will & Schulte #46, A&O Shearman #56-62,
      Kramer Levin was #92 (now merged to HSF Kramer). A newer 2026-2027 edition
      (released April 2026) also exists.
  amlaw_200:
    url: "https://www.law.com/americanlawyer/the-2025-am-law-200/"
    year: 2025   # 2025 Am Law 200, based on calendar-year 2024 gross revenue
    note: >
      Paywalled on law.com. The Am Law 100/200 ranks US-HQ (or US-reporting/verein)
      firms by gross revenue; London-HQ Magic Circle firms (Freshfields, Clifford
      Chance, Linklaters) are in the separate Global 200, NOT the Am Law 200, so they
      are EXCLUDED from the intersection. 2026 edition (2025 revenue) also exists at
      law.com/americanlawyer/2026/05/05/the-2026-am-law-200-ranked-by-gross-revenue/.

