# Runtime configuration for the BigLaw 3L monitor.
# Everything here is tunable without touching code.

db_path: state.db

http:
  timeout: 20            # per-request timeout (seconds)
  retries: 3             # retry count for connect/read/429/5xx
  backoff_factor: 1.0    # exponential backoff base (1.0 -> 1s, 2s, 4s ...)
  # user_agent: override if you like; a real-browser UA is the default.

filters:
  # ---------------------------------------------------------------------------
  # RECALL-FIRST design (this tool is a PRIMARY job-search net for a US 3L).
  #
  # Reality check from live data: BigLaw public ATS boards almost never title a
  # posting "first-year associate" -- entry-level hiring runs through OCI /
  # summer programs, and the public boards are dominated by *lateral* associate
  # roles named only by practice area ("Real Estate Associate (New York)"). A
  # precision filter keyed on "first-year"/"entry-level" therefore matches ~0
  # real postings. So instead we cast a wide net -- ANY US associate/attorney/
  # lawyer role -- and merely subtract the roles a graduating 3L plainly cannot
  # take (senior/mid-level/of-counsel/partner) and all non-fee-earner staff.
  # Better to skim a few lateral roles than silently miss the rare entry role.
  #
  # Want fewer, higher-precision hits instead? See "PRECISION MODE" note below.
  # ---------------------------------------------------------------------------

  # Toggle summer-associate roles on if you want them (default: off -- a
  # class-of-2026 grad's summer window has passed; summer postings are now for
  # rising 2Ls). Flip true if the search should include 2L summer programs.
  include_summer_associate: false

  # Drop postings whose location is clearly outside the US (see markers below).
  # BigLaw boards carry a big tail of London/Frankfurt/Paris/Singapore trainee &
  # NQ roles; a US 3L wants none of them. Recall-safe: only drops when a foreign
  # place is named AND no US place is -- ambiguous ("3 Locations") is kept.
  us_only: true

  # Search these Posting fields for keyword/regex matches.
  search_fields: [title]

  # ANY of these (word-boundary matched) => candidate include. The three bare
  # fee-earner words are the wide net; the rest are explicit entry signals kept
  # so they still match even if the exclude list is later tightened.
  include_keywords:
    - "associate"
    - "attorney"
    - "lawyer"
    - "first-year associate"
    - "entry-level associate"
    - "entry level associate"
    - "new grad"
    - "new graduate"
    - "3l"
    - "entering class"
    - "incoming associate"
    - "junior associate"
    - "judicial clerk"
    - "clerkship"

  # A confident entry signal here OVERRIDES the experience-based exclude_regexes
  # below (so e.g. "Entry-Level Associate (0-2 years)" is kept, not dropped).
  entry_signal_keywords:
    - "entry-level"
    - "entry level"
    - "first-year"
    - "first year"
    - "1st year"
    - "new grad"
    - "new graduate"
    - "incoming associate"
    - "3l"
    - "judicial clerk"

  # ANY of these => EXCLUDE (a role that states experience is not entry-level).
  # These are the "obviously not a new grad" signals; ambiguous titles with no
  # experience stated (a bare "Corporate Associate") are still kept for recall.
  # Patterns avoid matching the upper bound of a low range ("0-2 years") and keep
  # "first-year"/"1st year".
  exclude_regexes:
    - '(?<![\d\-–—])[2-9]\d*\s*[-–—]\s*\d+\s*(?:years?|yrs?|pqe)'   # "3-5 years", "3–5 PQE"
    - '(?<![\d\-–—])[2-9]\d*\s*\+\s*(?:years?|yrs?|pqe)'            # "5+ years"
    - '(?:at least|minimum|min\.?\s*of|min\.?|with|least)\s+[2-9]\d*\s*(?:years?|yrs?)'  # "at least 3 years"
    - '\b[2-9]\d*\s*(?:years?|yrs?)\s+(?:of\s+)?(?:experience|exp)\b'  # "3 years of experience"
    - '\byears?\s+of\s+(?:relevant\s+)?experience\b'               # generic "years of experience"
    - '(?<![\d\-–—])[2-9]\d*\s*\+?\s*pqe\b'                         # "3 PQE", "5+ PQE"
    - '\b(?:2nd|3rd|4th|5th|6th|7th|8th|second|third|fourth|fifth|sixth|seventh|eighth)[\s-]*year\b'  # 2nd+ year
    - '\bmid[\s-]?senior\b'                                         # "mid-senior level"

  # DESCRIPTION EXPERIENCE GATE ------------------------------------------------
  # BigLaw public boards rarely put seniority in the *title* -- a lateral role is
  # just "Corporate Associate", and the "3+ years" requirement lives in the body.
  # When a fetcher provides a description (Greenhouse/Lever/Ashby/career.page/
  # jsonapi/JSON-LD; NOT Workday/viRecruit/Radancy/browser, whose listings carry
  # no body), these NUMBER-BEARING patterns disqualify a title that is silent
  # about seniority. An entry signal anywhere in title+description overrides.
  # Recall-safe: a posting with no description is never dropped by this gate.
  #
  # These are deliberately number-bearing only -- the bare "years of experience"
  # phrase (in exclude_regexes) is NOT here, because nearly every description,
  # entry-level included, contains it. Ranges/floors starting at 1 are kept
  # (a "1-3 years" role is plausibly open to a new grad).
  experience_gate_description: true
  description_exclude_regexes:
    - '(?<![\d\-–—])[2-9]\d*\s*[-–—]\s*\d+\s*\+?\s*(?:years?|yrs?|pqe)'   # "3-5 years", "2-7+ years"
    - '(?<![\d\-–—])[2-9]\d*\s*\+\s*(?:years?|yrs?|pqe)'                  # "5+ years"
    - '(?:at least|minimum|min\.?|least|with|over)\s+(?:of\s+)?[2-9]\d*\s*\+?\s*(?:years?|yrs?)'  # "at least 3 years", "minimum of 5 years"
    - '(?<![\d\-–—])[2-9]\d*\s*(?:to|-|–|—|or more)\s*\d*\s*(?:years?|yrs?)\s+(?:of\s+)?(?:relevant\s+|prior\s+|practice\s+|legal\s+|professional\s+|law[\s-]firm\s+)?(?:experience|exp)\b'  # "3 to 5 years of experience"
    - '(?<![\d\-–—])[2-9]\d*\s*(?:years?|yrs?)\s+(?:of\s+)?(?:relevant\s+|prior\s+|practice\s+|legal\s+|professional\s+|law[\s-]firm\s+)?(?:experience|exp)\b'  # "3 years (of) experience" (guarded so "0-2 years" is kept)
    - '(?<![\d\-–—])[2-9]\d*\s*\+?\s*pqe\b'                               # "3 PQE", "5+ PQE"
    # Spelled-out year counts (very common: "two to four years", "at least three
    # years"). "one"/"a year" deliberately excluded so genuine junior roles pass.
    - '(?<!\w)(?:two|three|four|five|six|seven|eight|nine|ten)\s*(?:to|through|[-–—])\s*(?:one|two|three|four|five|six|seven|eight|nine|ten|\d+)\s*\+?\s*(?:years?|yrs?)'  # "two to four years"
    - '(?:at least|minimum|min\.?\s*of|least|with|about|approximately|over)\s+(?:two|three|four|five|six|seven|eight|nine|ten)\s*\+?\s*(?:years?|yrs?)'  # "at least two years"
    - '(?<!\w)(?:two|three|four|five|six|seven|eight|nine|ten)\s*\+?\s*(?:years?|yrs?)\s+(?:of\s+)?(?:relevant\s+|prior\s+|practice\s+|legal\s+|professional\s+|law[\s-]firm\s+|post[\s-]?(?:qualification|jd|graduate)\s+)?(?:experience|exp|practicing)\b(?!\s+(?:of\s+)?(?:law\s+)?school)'  # "two years of experience"

  # ANY of these regexes => candidate include (class-year / junior phrasings the
  # bare keywords might miss in unusual word order).
  include_regexes:
    - '\bclass of 20(2[5-9]|3\d)\b'
    - '\bclass years?\s+20(2[5-9]|3\d)\b'    # e.g. "Class Years 2026-2025"
    - '\b20(2[5-9]|3\d)\s+(incoming\s+)?associate'
    - '\bassociate[^.\n]{0,25}\b20(2[5-9]|3\d)\b'
    - '\bentering\s+class\b'
    - '\bjunior[- ]?level\b'

  # ANY of these => excluded, and exclude ALWAYS beats include. Two groups:
  #  (a) seniority a graduating 3L cannot fill; (b) non-attorney staff titles
  #  (they'd otherwise slip in via the bare "attorney"/"associate" includes).
  exclude_keywords:
    # (a) seniority
    - "lateral"
    - "partner"
    - "of counsel"
    - "counsel"           # also "senior counsel", "general counsel"
    - "senior"
    - "mid-level"
    - "midlevel"
    - "mid level"
    - "experienced"
    - "managing"
    # (b) non-fee-earner staff (attorney-titled support roles included)
    - "staff attorney"
    - "conflicts"
    - "docket"
    - "practice support"
    - "knowledge"
    - "professional development"
    - "business development"
    - "recruiting"
    - "recruiter"
    - "recruitment"
    - "paralegal"
    - "secretary"
    - "patent agent"
    - "librarian"
    - "law clerk"         # staff/library clerk, not a judicial clerkship
    - "coordinator"
    - "manager"
    - "director"
    - "administrator"
    - "assistant"
    - "analyst"
    - "specialist"
    - "officer"
    - "engineer"
    - "developer"
    - "technician"
    - "accountant"
    - "bookkeeper"
    - "marketing"
    - "internship"
    - "intern"
    # (c) foreign-language / foreign-qualification roles that slip the geo gate
    #     when the location is ambiguous ("2 Locations"). Clean, unambiguous
    #     signals for German / French / Italian / UK-Commonwealth postings.
    - "m/w/d"
    - "w/m/d"
    - "rechtsanwalt"
    - "berufserfahrung"
    - "referendar"
    - "spontanea"
    - "candidatura"
    - "stagiaire"
    - "solicitor"
    - "trainee"

  # PRECISION MODE: to instead receive only high-confidence entry-level hits,
  # delete "associate"/"attorney"/"lawyer" from include_keywords above. The
  # explicit entry signals + regexes then do the matching (far fewer emails,
  # but generically-titled entry roles will be missed).

  # Excluded unless include_summer_associate is true.
  summer_associate_keywords:
    - "summer associate"
    - "summer program"
    - "1l summer"
    - "2l summer"

  # US vs foreign location markers for the us_only gate (lowercase; word-boundary
  # matched against the posting location). US list is deliberately broad (a false
  # "US" only keeps an extra posting); foreign list must contain NO US place.
